<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOXNFT - NFT Grind Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="terminal">
        <div id="output"></div>
        <div id="input-line">
            <span class="prompt">guest@loxnft:~$</span>
            <input type="text" id="command-input" autocomplete="off" spellcheck="false" autofocus>
            <span id="cursor"></span>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
